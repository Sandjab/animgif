<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimGIF</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <div id="app">
      <aside id="panel-source">
        <h2>Source &amp; retouches</h2>
        <div id="dropzone">
          <p>Glissez une image ici<br />ou</p>
          <button id="btn-pick">Choisir un fichier…</button>
          <input id="file-input" type="file" accept="image/*" hidden />
        </div>
        <div id="adjustments" hidden>
          <label>Luminosité <input id="adj-brightness" type="range" min="0" max="2" step="0.05" value="1" /></label>
          <label>Contraste <input id="adj-contrast" type="range" min="0" max="2" step="0.05" value="1" /></label>
          <label>Saturation <input id="adj-saturation" type="range" min="0" max="2" step="0.05" value="1" /></label>
          <label>Sépia <input id="adj-sepia" type="range" min="0" max="1" step="0.05" value="0" /></label>
          <label>Noir &amp; blanc <input id="adj-grayscale" type="range" min="0" max="1" step="0.05" value="0" /></label>
          <label>Teinte <input id="adj-hue" type="range" min="0" max="360" step="5" value="0" /></label>
          <label>Flou <input id="adj-blur" type="range" min="0" max="10" step="0.5" value="0" /></label>
          <label><input id="adj-invert" type="checkbox" /> Inverser les couleurs</label>
          <div class="row">
            <button id="btn-flip-h" title="Miroir horizontal">⇋ H</button>
            <button id="btn-flip-v" title="Miroir vertical">⇵ V</button>
            <button id="btn-rot90" title="Pivoter 90°">⟳ 90°</button>
          </div>
          <label>Couleur de fond <input id="adj-bg" type="color" value="#000000" /></label>
          <button id="btn-remove-bg">Supprimer le fond</button>
          <progress id="bg-progress" max="1" value="0" hidden></progress>
          <p id="bg-status" class="hint"></p>
        </div>
      </aside>
      <main id="panel-canvas">
        <canvas id="view" hidden></canvas>
        <p id="canvas-hint" class="hint">Importez une image pour commencer</p>
      </main>
      <aside id="panel-anim">
        <h2>Animation &amp; export</h2>
        <div id="anim-controls" hidden>
          <div id="effects-list"></div>
          <div class="row" id="effect-buttons">
            <button data-effect="kenBurns">+ Zoom/Ken Burns</button>
            <button data-effect="rotation">+ Rotation</button>
            <button data-effect="translation">+ Translation</button>
            <button data-effect="bounce">+ Bounce</button>
            <button data-effect="pulse">+ Pulse</button>
            <button data-effect="shake">+ Shake</button>
            <button data-effect="sway">+ Balancement</button>
            <button data-effect="spin3d">+ Flip 3D</button>
          </div>
          <label>Steps <input id="anim-steps" type="number" min="2" max="120" value="24" /></label>
          <label><input id="anim-reverse" type="checkbox" /> Lecture inversée</label>
          <hr />
          <div class="row">
            <button id="btn-play">▶ Lecture</button>
          </div>
          <label>Délai <span id="delay-label">80 ms (12.5 FPS)</span>
            <input id="anim-delay" type="range" min="20" max="500" step="10" value="80" />
          </label>
          <label>Boucle
            <select id="loop-mode">
              <option value="infinite">Infinie</option>
              <option value="count">n fois</option>
              <option value="pingpong">Ping-pong</option>
            </select>
          </label>
          <input id="loop-count" type="number" min="1" max="100" value="1" hidden />
          <hr />
          <div class="row">
            <span>Format</span>
            <label><input type="radio" name="fmt" id="fmt-gif" value="gif" checked /> GIF</label>
            <label><input type="radio" name="fmt" id="fmt-mp4" value="mp4" /> MP4</label>
          </div>
          <p id="mp4-hint" class="hint" hidden></p>
          <label>Largeur <input id="out-w" type="number" min="16" max="4096" value="480" /></label>
          <label>Hauteur <input id="out-h" type="number" min="16" max="4096" value="480" /></label>
          <label><input id="lock-ratio" type="checkbox" checked /> Conserver les proportions</label>
          <label>Qualité <input id="out-quality" type="range" min="1" max="100" value="80" /></label>
          <label>Frames exportées
            <select id="out-decimation">
              <option value="1">Toutes</option>
              <option value="2">1 sur 2</option>
              <option value="3">1 sur 3</option>
            </select>
          </label>
          <button id="btn-export">Exporter le GIF</button>
          <button id="btn-cancel-export" hidden>Annuler</button>
          <progress id="export-progress" max="1" value="0" hidden></progress>
          <p id="export-status" class="hint"></p>
        </div>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
